name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv sync --group dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run ty check
      - run: >-
          uv run pytest -n auto --dist loadscope --timeout=60
          --cov=tstlan --cov-report=term-missing --cov-report=xml
          --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      # -W превращает предупреждения Sphinx в ошибки: битые ссылки на модули
      # и ошибки autodoc-импорта валят сборку, а не проходят молча
      - run: uv run --with sphinx sphinx-build -W -b html docs build/docs
      - uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: build/docs

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/tstlan-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/tstlan-web/package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/tstlan-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
