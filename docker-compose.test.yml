services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tstlan_test
      POSTGRES_USER: tstlan
      POSTGRES_PASSWORD: tstlan
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tstlan -d tstlan_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
